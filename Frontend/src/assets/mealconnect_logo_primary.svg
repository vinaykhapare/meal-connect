<svg width="380" height="100" viewBox="0 0 380 100" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon: plate with fork & spoon -->
  <g transform="translate(10, 18)">
    <!-- Plate -->
    <circle cx="26" cy="26" r="26" fill="#1A56A8"/>
    <circle cx="26" cy="26" r="20" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
    <!-- Fork (left) -->
    <line x1="19" y1="10" x2="19" y2="42" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="10" x2="16" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="10" x2="22" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="18" x2="19" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="18" x2="19" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Spoon (right) -->
    <ellipse cx="33" cy="14" rx="4.5" ry="6" fill="white" opacity="0.9"/>
    <line x1="33" y1="20" x2="33" y2="42" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="78" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="#1A56A8">Meal</text>
  <text x="146" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="#1A1A1A">Connect</text>

  <!-- Tagline -->
  <text x="79" y="76" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="2.5" fill="#888888" text-anchor="start">NOURISHING COMMUNITIES</text>

</svg>
